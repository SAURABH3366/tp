<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Bhumi ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
}

/* CENTER CONTAINER */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* BOY (emoji use kiya simple ke liye) */
.boy {
  font-size: 80px;
  animation: float 2s infinite ease-in-out;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: red;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: darkred;
  transform: scale(1.1);
}

/* HEART */
.heart {
  display: none;
  margin: 40px auto;
  width: 150px;
  height: 150px;
  background: red;
  transform: rotate(-45deg);
  position: relative;
  animation: beat 1s infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 150px;
  height: 150px;
  background: red;
  border-radius: 50%;
}

.heart::before { top: -75px; left: 0; }
.heart::after { left: 75px; top: 0; }

@keyframes beat {
  0%,100% { transform: scale(1) rotate(-45deg); }
  50% { transform: scale(1.2) rotate(-45deg); }
}

/* TEXT INSIDE HEART */
.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  font-size: 24px;
  opacity: 0;
}

/* SHOW TEXT */
.show {
  animation: reveal 2s forwards, glow 2s infinite alternate;
}

@keyframes reveal {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(45deg);}
  to { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(45deg);}
}

@keyframes glow {
  from { text-shadow: 0 0 10px white, 0 0 20px red; }
  to { text-shadow: 0 0 20px white, 0 0 40px red; }
}

/* FLOATING HEARTS */
.floating {
  position: absolute;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-800px); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
  <div class="boy">👦</div>
  <button onclick="openHeart()">Open Your Heart ❤️</button>

  <div class="heart" id="heart">
    <div class="text" id="text">Bhumi ❤️</div>
  </div>
</div>

<script>
function openHeart() {
  const heart = document.getElementById("heart");
  const text = document.getElementById("text");

  heart.style.display = "block";

  setTimeout(() => {
    text.classList.add("show");
  }, 800);
}

/* floating hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("floating");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
