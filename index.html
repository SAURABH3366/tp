<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Bhumi</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #0a0a0a, #000);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  color: white;
}

.container {
  text-align: center;
}

/* Boy SVG */
.boy {
  width: 140px;
  opacity: 0.9;
}

/* Button */
button {
  margin-top: 30px;
  padding: 12px 30px;
  font-size: 16px;
  border-radius: 30px;
  border: 1px solid #ff4d6d;
  background: transparent;
  color: #ff4d6d;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff4d6d;
  color: white;
}

/* Heart container */
.heart-container {
  position: relative;
  width: 120px;
  height: 120px;
  margin: 30px auto;
  display: none;
}

/* Heart halves */
.half {
  position: absolute;
  width: 60px;
  height: 100px;
  background: #ff4d6d;
  border-radius: 60px 60px 0 0;
  top: 0;
}

.left {
  left: 0;
  transform-origin: right;
}

.right {
  right: 0;
  transform-origin: left;
}

/* Split animation */
.split .left {
  animation: leftOpen 1s forwards;
}

.split .right {
  animation: rightOpen 1s forwards;
}

@keyframes leftOpen {
  to { transform: rotate(-45deg) translateX(-30px); }
}

@keyframes rightOpen {
  to { transform: rotate(45deg) translateX(30px); }
}

/* Text */
.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  font-size: 22px;
  letter-spacing: 1px;
}

.show {
  animation: fadeIn 2s forwards, glow 3s infinite alternate;
}

@keyframes fadeIn {
  to { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ff4d6d; }
  to { text-shadow: 0 0 25px #ff4d6d, 0 0 40px #ff4d6d; }
}

/* subtle floating dots */
.dot {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #ff4d6d;
  border-radius: 50%;
  opacity: 0.5;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(-800px); }
}
</style>
</head>

<body>

<div class="container">

  <!-- Boy SVG -->
  <svg class="boy" viewBox="0 0 64 64" fill="white">
    <circle cx="32" cy="20" r="10"/>
    <rect x="22" y="30" width="20" height="25" rx="10"/>
  </svg>

  <button onclick="openHeart()">Open your heart</button>

  <div class="heart-container" id="heart">
    <div class="half left"></div>
    <div class="half right"></div>
    <div class="text" id="text">Bhumi ❤️</div>
  </div>

</div>

<script>
function openHeart() {
  const heart = document.getElementById("heart");
  const text = document.getElementById("text");

  heart.style.display = "block";
  heart.classList.add("split");

  setTimeout(() => {
    text.classList.add("show");
  }, 1000);
}

/* subtle particles */
function createDot() {
  const dot = document.createElement("div");
  dot.className = "dot";
  dot.style.left = Math.random() * 100 + "vw";
  dot.style.top = "100vh";
  document.body.appendChild(dot);

  setTimeout(() => dot.remove(), 6000);
}

setInterval(createDot, 200);
</script>

</body>
</html>
